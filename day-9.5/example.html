<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .body{
           margin: 0;
           background-color:  #1f0303;
           font-family:'Courier New', Courier, monospace;
        }
        .container{
            column-count:5;
            column-gap:10px;
            padding:10px;
        }
        .feed-items{
            margin-bottom:10px;
            border-radius: 10px;
            overflow:hidden;
        }
        .feed-items img{
            width:100%;
            height:auto;
            display: block;
        }
        .feed-items img:hover{
            transform:scale(1.03)
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="feed-items"><img src="https://picsum.photos/300/500/?random=1"> </div>
        <div class="feed-items"><img src="https://picsum.photos/300/400/?random=2"></div>
        <div class="feed-items"><img src="https://picsum.photos/300/600/?random=3"></div>
        <div class="feed-items"><img src="https://picsum.photos/300/400/?random=3"></div>
        <div class="feed-items"><img src="https://picsum.photos/300/600/?random=4"></div>
        <div class="feed-items"><img src="https://picsum.photos/300/700/?random=5"></div>
        <div class="feed-items"><img src="https://picsum.photos/300/400/?random=6"></div>
        <div class="feed-items"><img src="https://picsum.photos/300/500/?random=7"></div>
        <div class="feed-items"><img src="https://picsum.photos/300/400/?random=8"></div>
        <div class="feed-items"><img src="https://picsum.photos/300/500/?random=9"></div>
        <div class="feed-items"><img src="https://picsum.photos/300/700/?random=10"></div>
    </div>
</body>
</html>
